spring:
  application:
    name: nail-salon-backend
  profiles:
    # Default to dev (local PostgreSQL via docker-compose). Activate other
    # profiles with -Dspring-boot.run.profiles=prod, or SPRING_PROFILES_ACTIVE=test in CI.
    default: dev
  jpa:
    open-in-view: false
  servlet:
    multipart:
      # Container hard limit slightly above the 5MB application-level image cap so
      # oversized uploads get our clean 413 problem+json instead of a container error.
      max-file-size: 6MB
      max-request-size: 7MB

server:
  port: ${PORT:8092}
  servlet:
    session:
      cookie:
        # SESSION matches the OpenAPI contract's ownerSession security scheme.
        name: SESSION
        http-only: true
        same-site: lax

app:
  cors:
    # Next.js dev servers: booking site (3000) and owner CRM (3001).
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:3001}
  media:
    # Local-disk image storage; swap for object storage (S3 etc.) before real deployment.
    local-dir: ${APP_MEDIA_DIR:./data/media}
  webhooks:
    # Shared secret for the stand-in webhook signature check. Empty = reject all
    # webhooks (fail closed). Replaced by real provider-signature validation (Twilio)
    # when SMS goes live.
    shared-secret: ${APP_WEBHOOK_SECRET:}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized

---
# --- dev profile: local PostgreSQL started via `docker compose up -d` (see docker-compose.yml) ---
spring:
  config:
    activate:
      on-profile: dev
  datasource:
    url: jdbc:postgresql://localhost:${DB_PORT:5433}/nailsalon
    username: ${DB_USER:nailsalon}
    password: ${DB_PASSWORD:nailsalon}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate

---
# --- h2 override: run WITH dev (`--spring.profiles.active=dev,h2`) to swap PostgreSQL
# for a file-based H2 database when Docker isn't available. Seeder still runs (dev). ---
spring:
  config:
    activate:
      on-profile: h2
  datasource:
    url: jdbc:h2:file:./data/nailsalon-dev;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
    username: sa
    password: ""
    driver-class-name: org.h2.Driver

---
# --- test profile: in-memory H2 in PostgreSQL-compatibility mode, no external services required ---
spring:
  config:
    activate:
      on-profile: test
  datasource:
    url: jdbc:h2:mem:nailsalon-test;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
    username: sa
    password: ""
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: validate

app:
  media:
    # Keep test uploads inside target/ so they're wiped by mvn clean.
    local-dir: ./target/test-media
  webhooks:
    shared-secret: test-webhook-secret

---
# --- prod profile: PostgreSQL configured entirely via environment variables (set by the hosting platform) ---
spring:
  config:
    activate:
      on-profile: prod
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate

management:
  endpoint:
    health:
      show-details: never
